<script>
  (function () {
    function id(v) { return document.getElementById(v); }
    let totalImages = 0, loadedImages = 0;
    let extraImages = [];
    let phraseInterval;

    const phrases = [
      "Warming up the pixels…",
      "Aligning the stars…",
      "Polishing the glass…",
      "Booting creativity core…",
      "Painting with light…",
      "Mixing magic with code…",
      "Rendering awesomeness…",
      "Spinning up the ideas…",
      "Loading something epic…"
    ];

    function loadbar() {
      var ovrl = id("overlay"),
        prog = id("progress"),
        stat = id("progstat"),
        img = document.images;

      totalImages = img.length;

      if (totalImages === 0) {
        doneLoading();
      }

      function imgLoaded() {
        loadedImages++;
        let perc = ((100 / totalImages * loadedImages) << 0) + "%";
        prog.style.width = perc;
        stat.textContent = `${getRandomPhrase()} ${perc}`;

        if (loadedImages === totalImages) {
          return doneLoading();
        }
      }

      function animateOut() {
        clearInterval(phraseInterval);
        stat.innerHTML = "Done!";
        ovrl.style.transform = 'scaleY(0)';
        setTimeout(() => {
          ovrl.style.display = "none";
        }, 1000);
      }

      function doneLoading() {
        stat.innerHTML = "Done!";
        clearInterval(phraseInterval);
        setTimeout(() => {
          animateOut();
        }, 400);
      }

      function startPhraseCycler() {
        phraseInterval = setInterval(() => {
          if (loadedImages !== totalImages) {
            stat.textContent = `${getRandomPhrase()} ${((100 / totalImages * loadedImages) << 0)}%`;
          }
        }, 3000);
      }

      function getRandomPhrase() {
        return phrases[Math.floor(Math.random() * phrases.length)];
      }

      for (var i = 0; i < totalImages; i++) {
        var tImg = new Image();
        tImg.onload = imgLoaded;
        tImg.onerror = imgLoaded;
        tImg.src = img[i].src;
      }

      window.trackImageLoad = function (src) {
        totalImages++;
        let dynImg = new Image();
        dynImg.onload = imgLoaded;
        dynImg.onerror = imgLoaded;
        dynImg.src = src;
        extraImages.push(dynImg);
      };

      const baseAssets = [
        "/fonts/Cooljazz.woff"
      ];

      const fullImages = [
        "/p1.jpeg",
        "/p2.jpg",
        "/p3.jpg",
        "/p4.jpg",
        "/p5.jpg",
        "/p6.jpg",
        "/wall1.jpg",
        "/wall2.jpg",
        "/wall3.jpg",
        "/wall4.jpg",
        "/wall5.jpg",
        "/wall6.jpg"
      ];

      const mobileImages = [
        "/lc.jpg",
        "/cc.jpg",
        "/git.jpg"
      ];

      if (window.innerWidth >= 992) {
        baseAssets.concat(fullImages).forEach(src => {
          trackImageLoad(src);
        });
      } else {
        baseAssets.concat(mobileImages).forEach(src => {
          trackImageLoad(src);
        });
      }

      startPhraseCycler();
    }

    document.addEventListener('DOMContentLoaded', loadbar, false);
  })();

</script>

    let isMuted = false;
    const sounds = [

    function toggleVolume() {

    let originalTitle = document.title;
    const titles = [

      "Let’s build something great together!",
      "See you back soon!",
      "My portfolio awaits your return",
      "Unlock my projects anytime!",

      "Dive back into innovation!",

      "Shaping visions into results!",

      "Let’s make magic happen!",

    function getRandomTitle() {

    document.addEventListener("DOMContentLoaded", function () {

      el.addEventListener("click", function (event) {
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        var email = document.querySelector('input[name="email"]').value;
        var message = document.querySelector('textarea[name="message"]').value;

    class ArrowPointer {
      constructor() {
        this.root = document.body;
        this.cursor = document.querySelector(".cursor");

        this.position = {
          distanceX: 0,
          distanceY: 0,
          distance: 0,
          pointerX: 0,
          pointerY: 0,
        };
        this.previousPointerX = 0;
        this.previousPointerY = 0;
        this.angle = 0;
        this.previousAngle = 0;
        this.angleDisplace = 0;
        this.degrees = 57.296;
        this.cursorSize = 25;

        this.cursorStyle = {
          boxSizing: "border-box",
          position: "fixed",
          top: "0px",
          left: `${-this.cursorSize / 2}px`,
          zIndex: "2147483647",
          width: `${this.cursorSize}px`,
          height: `${this.cursorSize}px`,
          transition: "250ms, transform 82ms",
          userSelect: "none",
          pointerEvents: "none",
          opacity: "1",
        };

        this.init(this.cursor, this.cursorStyle);
        this.addActiveInactiveListeners();
      }

      init(el, style) {
        Object.assign(el.style, style);
        this.cursor.removeAttribute("hidden");
      }

      move(event) {
        this.previousPointerX = this.position.pointerX;
        this.previousPointerY = this.position.pointerY;
        this.position.pointerX =
          event.pageX + this.root.getBoundingClientRect().x;
        this.position.pointerY =
          event.pageY + this.root.getBoundingClientRect().y;
        this.position.distanceX =
          this.previousPointerX - this.position.pointerX;
        this.position.distanceY =
          this.previousPointerY - this.position.pointerY;
        this.distance = Math.sqrt(
          this.position.distanceY ** 2 + this.position.distanceX ** 2
        );

        this.cursor.style.transform = `translate3d(${this.position.pointerX}px, ${this.position.pointerY}px, 0)`;

        if (this.distance > 1) {
          this.rotate(this.position);
        } else {
          this.cursor.style.transform += ` rotate(${this.angleDisplace}deg)`;
        }
      }

      rotate(position) {
        let unsortedAngle =
          Math.atan(
            Math.abs(position.distanceY) / Math.abs(position.distanceX)
          ) * this.degrees;
        let modAngle;
        const style = this.cursor.style;
        this.previousAngle = this.angle;

        if (position.distanceX <= 0 && position.distanceY >= 0) {
          this.angle = 90 - unsortedAngle + 0;
        } else if (position.distanceX < 0 && position.distanceY < 0) {
          this.angle = unsortedAngle + 90;
        } else if (position.distanceX >= 0 && position.distanceY <= 0) {
          this.angle = 90 - unsortedAngle + 180;
        } else if (position.distanceX > 0 && position.distanceY > 0) {
          this.angle = unsortedAngle + 270;
        }

        if (isNaN(this.angle)) {
          this.angle = this.previousAngle;
        } else {
          if (this.angle - this.previousAngle <= -270) {
            this.angleDisplace += 360 + this.angle - this.previousAngle;
          } else if (this.angle - this.previousAngle >= 270) {
            this.angleDisplace += this.angle - this.previousAngle - 360;
          } else {
            this.angleDisplace += this.angle - this.previousAngle;
          }
        }
        style.transform += ` rotate(${this.angleDisplace}deg)`;

        setTimeout(() => {
          modAngle =
            this.angleDisplace >= 0
              ? this.angleDisplace % 360
              : 360 + (this.angleDisplace % 360);
          if (modAngle >= 45 && modAngle < 135) {
            style.left = `${-this.cursorSize}px`;
            style.top = `${-this.cursorSize / 2}px`;
          } else if (modAngle >= 135 && modAngle < 225) {
            style.left = `${-this.cursorSize / 2}px`;
            style.top = `${-this.cursorSize}px`;
          } else if (modAngle >= 225 && modAngle < 315) {
            style.left = "0px";
            style.top = `${-this.cursorSize / 2}px`;
          } else {
            style.left = `${-this.cursorSize / 2}px`;
            style.top = "0px";
          }
        }, 0);
      }

      addActiveInactiveListeners() {
        document.addEventListener("mouseenter", () => {
          this.cursor.style.opacity = "1";
        });
        document.addEventListener("mouseleave", () => {
          this.cursor.style.opacity = "0";
        });
      }

      remove() {
        this.cursor.remove();
      }
    }

    (() => {
      const cursor = new ArrowPointer();
      if (
        !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
          navigator.userAgent
        )
      ) {
        document.onmousemove = function (event) {
          cursor.move(event);
        };
      } else {
        cursor.remove();
      }
    })();

    class Button {
      constructor(buttonElement) {
        this.block = buttonElement;
        this.init();
        this.initEvents();
      }

      init() {
        const el = gsap.utils.selector(this.block);

        this.DOM = {
          button: this.block,
          flair: el(".button__flair"),
        };

        this.xSet = gsap.quickSetter(this.DOM.flair, "xPercent");
        this.ySet = gsap.quickSetter(this.DOM.flair, "yPercent");
      }

      getXY(e) {
        const { left, top, width, height } =
          this.DOM.button.getBoundingClientRect();

        const xTransformer = gsap.utils.pipe(
          gsap.utils.mapRange(0, width, 0, 100),
          gsap.utils.clamp(0, 100)
        );

        const yTransformer = gsap.utils.pipe(
          gsap.utils.mapRange(0, height, 0, 100),
          gsap.utils.clamp(0, 100)
        );

        return {
          x: xTransformer(e.clientX - left),
          y: yTransformer(e.clientY - top),
        };
      }

      initEvents() {
        this.DOM.button.addEventListener("mouseenter", (e) => {
          const { x, y } = this.getXY(e);

          this.xSet(x);
          this.ySet(y);

          gsap.to(this.DOM.flair, {
            scale: 1,
            duration: 0.4,
            ease: "power2.out",
          });
        });

        this.DOM.button.addEventListener("mouseleave", (e) => {
          const { x, y } = this.getXY(e);

          gsap.killTweensOf(this.DOM.flair);

          gsap.to(this.DOM.flair, {
            xPercent: x > 90 ? x + 20 : x < 10 ? x - 20 : x,
            yPercent: y > 90 ? y + 20 : y < 10 ? y - 20 : y,
            scale: 0,
            duration: 0.3,
            ease: "power2.out",
          });
        });

        this.DOM.button.addEventListener("mousemove", (e) => {
          const { x, y } = this.getXY(e);

          gsap.to(this.DOM.flair, {
            xPercent: x,
            yPercent: y,
            duration: 0.4,
            ease: "power2",
          });
        });
      }
    }

    const buttonElements = document.querySelectorAll('[data-block="button"]');

    buttonElements.forEach((buttonElement) => {
      new Button(buttonElement);
    });

    document.addEventListener("DOMContentLoaded", function () {
      let marks = document.querySelectorAll("mark");
      function revealHighlight() {
        marks.forEach((mark) => {
          let rect = mark.getBoundingClientRect();
          if (rect.top < window.innerHeight * 0.8) {
            mark.classList.add("reveal");
          }
        });
      }
      window.addEventListener("scroll", revealHighlight);
      revealHighlight();
    });

    const profileImg = document.getElementById("profile-img");
    const navbarBg = document.querySelector(".navbar-bg");

    const profileImages = [
      "/p1.jpeg",
      "/p2.jpg",
      "/p3.jpg",
      "/p4.jpg",
      "/p5.jpg",
      "/p6.jpg"
    ].map(img => {
      new Image().src = img;
      return img;
    });

    const backgroundImages = [
      "/wall1.jpg",
      "/wall2.jpg",
      "/wall3.jpg",
      "/wall4.jpg",
      "/wall5.jpg",
      "/wall6.jpg"
    ].map(img => {
      new Image().src = img;
      return img;
    });

    let index = 0;
    let isTransitioning = false;

    function changeImages() {
      if (isTransitioning) return;
      isTransitioning = true;

      profileImg.classList.add("animate__animated", "animate__flipOutX");
      navbarBg.classList.add("animate__animated", "animate__fadeOut");

      setTimeout(() => {
        profileImg.src = profileImages[index];
        navbarBg.style.backgroundImage = `linear-gradient(var(--navover), var(--navover)), url('${backgroundImages[index]}')`;

        profileImg.classList.replace("animate__flipOutX", "animate__flipInX");
        navbarBg.classList.replace("animate__fadeOut", "animate__fadeIn");
      }, 400);

      setTimeout(() => {
        profileImg.classList.remove("animate__animated", "animate__flipInX");
        navbarBg.classList.remove("animate__animated", "animate__fadeIn");

        isTransitioning = false;
      }, 800);

      index = (index + 1) % Math.max(profileImages.length, backgroundImages.length);
    }

    document.addEventListener("DOMContentLoaded", () => {
      changeImages();
      setInterval(changeImages, 6000);
    });

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        link.classList.add('animate__animated', 'animate__rubberBand');

        setTimeout(() => {
          link.classList.remove('animate__animated', 'animate__rubberBand');
        }, 1000);
      });
    });

    document.addEventListener('DOMContentLoaded', function () {
      const timeline = document.querySelector('.edu-timeline');
      const options = {
        root: null,
        rootMargin: '0px',
        threshold: 0.4
      };

      const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in-view');
          }
          else {
            entry.target.classList.remove('in-view');
          }
        });
      }, options);
      observer.observe(timeline);
    });
  </script>
